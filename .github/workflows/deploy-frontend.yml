name: Deploy Frontend to S3/CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'recipe-app-v2/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: recipe-app-v2/package-lock.json
      
      - name: Install dependencies
        working-directory: recipe-app-v2
        run: npm ci
      
      - name: Build Next.js app
        working-directory: recipe-app-v2
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Deploy to S3
        working-directory: recipe-app-v2
        run: |
          aws s3 sync ./out s3://recipe-app-frontend-9550 --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html"
          aws s3 sync ./out s3://recipe-app-frontend-9550 --delete --cache-control "public,max-age=0,must-revalidate" --include "*.html" --exclude "*"
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E3BFO3SCL6BTSX --paths "/*"
      
      - name: Deployment complete
        run: |
          echo "Deployment successful!"
          echo "CloudFront URL: https://d58uxuh1bkppb.cloudfront.net"
