name: Deploy Frontend to S3/CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'recipe-app-v2/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: recipe-app-v2
        run: |
          rm -f package-lock.json
          npm install
      
      - name: Build Next.js app
        working-directory: recipe-app-v2
        run: npm run build
        env:
          NEXT_PUBLIC_API_CONFIRM_EMAIL_ENDPOINT: /confirm-email
          NEXT_PUBLIC_API_GENERATE_ENDPOINT: /generate-recipe
          NEXT_PUBLIC_API_LOGIN_ENDPOINT: /login
          NEXT_PUBLIC_API_REGISTER_ENDPOINT: /register
          NEXT_PUBLIC_AUTH_API_URL: https://nuz5dbksz2.execute-api.us-east-1.amazonaws.com/dev
          NEXT_PUBLIC_AWS_REGION: us-east-1
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 1ia9lcg1nsld42j3giuvaeeo1b
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: us-east-1_N0KMxM07E
          NEXT_PUBLIC_RECIPE_API_URL: https://f3ohu70iha.execute-api.us-east-1.amazonaws.com/dev
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Deploy to S3
        working-directory: recipe-app-v2
        run: |
          aws s3 sync ./out s3://recipe-app-frontend-9550 --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html" --content-type-by-extension
          aws s3 sync ./out s3://recipe-app-frontend-9550 --delete --cache-control "public,max-age=0,must-revalidate" --content-type "text/html" --exclude "*" --include "*.html"
          aws s3 cp s3://recipe-app-frontend-9550/index.html s3://recipe-app-frontend-9550/index.html --content-type "text/html" --metadata-directive REPLACE --cache-control "public,max-age=0,must-revalidate"
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E3BFO3SCL6BTSX --paths "/*"
      
      - name: Deployment complete
        run: |
          echo "Deployment successful!"
          echo "CloudFront URL: https://d58uxuh1bkppb.cloudfront.net"
