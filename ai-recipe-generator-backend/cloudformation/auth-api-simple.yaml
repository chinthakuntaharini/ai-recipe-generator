AWSTemplateFormatVersion: '2010-09-09'
Description: 'Simple Authentication API endpoints for AI Recipe Generator'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name'
  
  UserPoolId:
    Type: String
    Default: 'us-east-1_N0KMxM07E'
    Description: 'Cognito User Pool ID'
  
  UserPoolClientId:
    Type: String
    Default: '1ia9lcg1nsld42j3giuvaeeo1b'
    Description: 'Cognito User Pool Client ID'

Resources:
  # IAM Role for Lambda Functions
  AuthLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ai-recipe-auth-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:SignUp
                  - cognito-idp:InitiateAuth
                  - cognito-idp:ConfirmSignUp
                  - cognito-idp:ResendConfirmationCode
                  - cognito-idp:ForgotPassword
                  - cognito-idp:ConfirmForgotPassword
                  - cognito-idp:GetUser
                  - cognito-idp:AdminGetUser
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'

  # Lambda Function for User Registration
  RegisterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-recipe-auth-register-${Environment}'
      Runtime: nodejs18.x
      Handler: handlers/auth-handler.registerHandler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.registerHandler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Access-Control-Allow-Headers': 'Content-Type',
                'Access-Control-Allow-Methods': 'POST, OPTIONS'
              },
              body: JSON.stringify({ message: 'Placeholder - deploy actual code' })
            };
          };
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ENVIRONMENT: !Ref Environment
      Timeout: 30
      MemorySize: 256

  # Lambda Function for User Login
  LoginFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-recipe-auth-login-${Environment}'
      Runtime: nodejs18.x
      Handler: handlers/auth-handler.loginHandler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.loginHandler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Access-Control-Allow-Origin': '*',
                'Access-Control-Allow-Headers': 'Content-Type',
                'Access-Control-Allow-Methods': 'POST, OPTIONS'
              },
              body: JSON.stringify({ message: 'Placeholder - deploy actual code' })
            };
          };
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ENVIRONMENT: !Ref Environment
      Timeout: 30
      MemorySize: 256

  # API Gateway REST API
  AuthAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'ai-recipe-auth-api-${Environment}'
      Description: 'Authentication API for AI Recipe Generator'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource: /auth
  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !GetAtt AuthAPI.RootResourceId
      PathPart: 'auth'

  # API Gateway Resource: /auth/register
  RegisterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !Ref AuthResource
      PathPart: 'register'

  # API Gateway Resource: /auth/login
  LoginResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !Ref AuthResource
      PathPart: 'login'

  # POST /auth/register
  RegisterMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthAPI
      ResourceId: !Ref RegisterResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RegisterFunction.Arn}/invocations'

  # OPTIONS /auth/register
  RegisterOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthAPI
      ResourceId: !Ref RegisterResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # POST /auth/login
  LoginMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthAPI
      ResourceId: !Ref LoginResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LoginFunction.Arn}/invocations'

  # OPTIONS /auth/login
  LoginOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AuthAPI
      ResourceId: !Ref LoginResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # Lambda Permissions for API Gateway
  RegisterLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RegisterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AuthAPI}/*/POST/auth/register'

  LoginLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LoginFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AuthAPI}/*/POST/auth/login'

  # API Gateway Deployment
  AuthAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RegisterMethod
      - LoginMethod
      - RegisterOptionsMethod
      - LoginOptionsMethod
    Properties:
      RestApiId: !Ref AuthAPI
      Description: !Sub 'Deployment for ${Environment} environment'

  # API Gateway Stage
  AuthAPIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref AuthAPI
      DeploymentId: !Ref AuthAPIDeployment
      StageName: !Ref Environment
      Description: !Sub 'Stage for ${Environment} environment'

Outputs:
  AuthAPIId:
    Description: 'Authentication API Gateway ID'
    Value: !Ref AuthAPI
    Export:
      Name: !Sub '${AWS::StackName}-AuthAPIId'

  AuthAPIUrl:
    Description: 'Authentication API Gateway URL'
    Value: !Sub 'https://${AuthAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-AuthAPIUrl'

  RegisterFunctionArn:
    Description: 'Register Lambda Function ARN'
    Value: !GetAtt RegisterFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RegisterFunctionArn'

  LoginFunctionArn:
    Description: 'Login Lambda Function ARN'
    Value: !GetAtt LoginFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LoginFunctionArn'