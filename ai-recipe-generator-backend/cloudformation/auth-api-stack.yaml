  # API Gateway REST API
  AuthAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'ai-recipe-auth-api-${Environment}'
      Description: 'Authentication API for AI Recipe Generator'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: 'ai-recipe-generator'
        - Key: Component
          Value: 'auth-api'

  # API Gateway Resource: /auth
  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !GetAtt AuthAPI.RootResourceId
      PathPart: 'auth'

  # API Gateway Resource: /auth/register
  RegisterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !Ref AuthResource
      PathPart: 'register'

  # API Gateway Resource: /auth/login
  LoginResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AuthAPI
      ParentId: !Ref AuthResource
      PathPart: 'login'

  # API Gateway Resource: /auth/confirm-email
