AWSTemplateFormatVersion: '2010-09-09'
Description: 'Authentication API endpoints for AI Recipe Generator'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name'
  
  UserPoolId:
    Type: String
    Default: 'us-east-1_N0KMxM07E'
    Description: 'Cognito User Pool ID'
  
  UserPoolClientId:
    Type: String
    Default: '1ia9lcg1nsld42j3giuvaeeo1b'
    Description: 'Cognito User Pool Client ID'

Resources:
  # IAM Role for Lambda Functions
  AuthLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ai-recipe-auth-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:SignUp
                  - cognito-idp:InitiateAuth
                  - cognito-idp:ConfirmSignUp
                  - cognito-idp:ResendConfirmationCode
                  - cognito-idp:ForgotPassword
                  - cognito-idp:ConfirmForgotPassword
                  - cognito-idp:GetUser
                  - cognito-idp:AdminGetUser
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'

  # Lambda Function for User Registration
  RegisterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-recipe-auth-register-${Environment}'
      Runtime: nodejs18.x
      Handler: handlers/auth-handler.registerHandler
      Role: !GetAtt AuthLambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.registerHandler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Placeholder - deploy actual code' })
            };
          };
      Environment:
        Variables:
          COGNITO_REGION: !Ref AWS::Region
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ENVIRONMENT: !Ref Environment
      Timeout: 30
      MemorySize: 256
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: 'ai-recipe-generator'
        - Key: Component
          Value: 'auth-api'

  # Lambda Function for User Login
  LoginFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ai-recipe-auth-login-${Environment}'
      Runtime: nodejs18.x
      Handler: handlers/auth-handler.loginHandler
