  # API Gateway Deployment
  AuthAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RegisterMethod
      - LoginMethod
      - ConfirmEmailMethod
      - ResendConfirmationMethod
      - ForgotPasswordMethod
      - ConfirmForgotPasswordMethod
      - RefreshTokenMethod
      - RegisterOptionsMethod
      - LoginOptionsMethod
      - ConfirmEmailOptionsMethod
      - ResendConfirmationOptionsMethod
      - ForgotPasswordOptionsMethod
      - ConfirmForgotPasswordOptionsMethod
      - RefreshTokenOptionsMethod
    Properties:
      RestApiId: !Ref AuthAPI
      Description: !Sub 'Deployment for ${Environment} environment'

  # API Gateway Stage
  AuthAPIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref AuthAPI
      DeploymentId: !Ref AuthAPIDeployment
      StageName: !Ref Environment
      Description: !Sub 'Stage for ${Environment} environment'
      Variables:
        Environment: !Ref Environment
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: 'ai-recipe-generator'
        - Key: Component
          Value: 'auth-api'

  # CloudWatch Log Group for API Gateway
  AuthAPILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/ai-recipe-auth-api-${Environment}'
      RetentionInDays: 14
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: 'ai-recipe-generator'
        - Key: Component
          Value: 'auth-api'

Outputs:
  AuthAPIId:
    Description: 'Authentication API Gateway ID'
    Value: !Ref AuthAPI
    Export:
      Name: !Sub '${AWS::StackName}-AuthAPIId'

  AuthAPIUrl:
    Description: 'Authentication API Gateway URL'
    Value: !Sub 'https://${AuthAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-AuthAPIUrl'

  RegisterFunctionArn:
    Description: 'Register Lambda Function ARN'
    Value: !GetAtt RegisterFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RegisterFunctionArn'

  LoginFunctionArn:
    Description: 'Login Lambda Function ARN'
    Value: !GetAtt LoginFunction.Arn
    Export:
