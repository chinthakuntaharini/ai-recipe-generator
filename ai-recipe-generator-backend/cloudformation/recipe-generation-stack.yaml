AWSTemplateFormatVersion: '2010-09-09'
Description: 'Recipe Generation Lambda Function and API Gateway Integration'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name
  
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT validation
    Default: us-east-1_N0KMxM07E
  
  CognitoUserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID
    Default: 4aqhvhqhvhqhvhqhvhqhvhqhvh

Resources:
  # IAM Role for Recipe Generation Lambda
  RecipeGenerationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'RecipeGenerationLambdaRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: 
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-text-express-v1'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:GetUser
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'

  # Recipe Generation Lambda Function
  RecipeGenerationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'recipe-generation-${Environment}'
      Runtime: nodejs18.x
      Handler: dist/handlers/recipe-handler.generateRecipe
      Role: !GetAtt RecipeGenerationLambdaRole.Arn
      Code:
        ZipFile: |
          exports.generateRecipe = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Placeholder function - deploy actual code' })
            };
          };
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClientId
          COGNITO_REGION: !Ref AWS::Region
      Timeout: 30
      MemorySize: 512
      Description: 'Lambda function for AI recipe generation using Amazon Bedrock'

  # Lambda Permission for API Gateway
  RecipeGenerationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RecipeGenerationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RecipeGenerationApi}/*/*'

  # API Gateway REST API
  RecipeGenerationApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'recipe-generation-api-${Environment}'
      Description: 'API for AI Recipe Generation Service'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: '*'

  # API Gateway Resource for /generate-recipe
  GenerateRecipeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RecipeGenerationApi
      ParentId: !GetAtt RecipeGenerationApi.RootResourceId
      PathPart: generate-recipe

  # OPTIONS method for CORS
  GenerateRecipeOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RecipeGenerationApi
      ResourceId: !Ref GenerateRecipeResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # POST method for recipe generation
  GenerateRecipePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RecipeGenerationApi
      ResourceId: !Ref GenerateRecipeResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RecipeGenerationFunction.Arn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 401
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false

  # API Gateway Deployment
  RecipeGenerationApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GenerateRecipePostMethod
      - GenerateRecipeOptionsMethod
    Properties:
      RestApiId: !Ref RecipeGenerationApi
      StageName: !Ref Environment
      Description: !Sub 'Deployment for ${Environment} environment'

  # CloudWatch Log Group for Lambda
  RecipeGenerationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/recipe-generation-${Environment}'
      RetentionInDays: 14

Outputs:
  RecipeGenerationFunctionArn:
    Description: 'ARN of the Recipe Generation Lambda Function'
    Value: !GetAtt RecipeGenerationFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RecipeGenerationFunctionArn'

  RecipeGenerationApiId:
    Description: 'ID of the Recipe Generation API Gateway'
    Value: !Ref RecipeGenerationApi
    Export:
      Name: !Sub '${AWS::StackName}-RecipeGenerationApiId'

  RecipeGenerationApiUrl:
    Description: 'URL of the Recipe Generation API'
    Value: !Sub 'https://${RecipeGenerationApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-RecipeGenerationApiUrl'

  GenerateRecipeEndpoint:
    Description: 'Full URL for the generate-recipe endpoint'
    Value: !Sub 'https://${RecipeGenerationApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/generate-recipe'
    Export:
      Name: !Sub '${AWS::StackName}-GenerateRecipeEndpoint'